<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PublisHearts Login</title>
    <meta name="description" content="Sign in to your PublisHearts account." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="membership-page" data-page-key="login">
    <div class="page-glow page-glow-a"></div>
    <div class="page-glow page-glow-b"></div>
    <header class="site-header">
      <div class="container row-between">
        <a class="brand" href="/">
          <span class="brand-mark">P</span>
          <span>PublisHearts</span>
        </a>
        <div class="header-actions">
          <a class="ghost-btn ghost-link" href="/">Home</a>
          <a class="ghost-btn ghost-link" href="/signup.html?next=/membership.html">Sign Up</a>
        </div>
      </div>
    </header>

    <main class="membership-shell container" data-page-sections-root>
      <section class="membership-hero" data-page-section-id="hero" data-page-section-label="Hero">
        <p class="eyebrow">Account</p>
        <h1>Login</h1>
        <p>Sign in to open your account page and access store checkout.</p>
      </section>

      <section class="membership-card" data-page-section-id="form" data-page-section-label="Login Form">
        <form id="login-form" class="membership-form">
          <label>
            Email
            <input id="login-email" type="email" maxlength="180" required />
          </label>
          <label>
            Password
            <input id="login-password" type="password" minlength="8" maxlength="200" required />
          </label>
          <button id="login-submit-btn" class="primary-btn block" type="submit">Login</button>
          <a class="ghost-btn ghost-link block" href="/signup.html?next=/membership.html">Need an account? Sign Up</a>
        </form>
        <p id="login-message" class="checkout-message"></p>
      </section>
    </main>

    <script type="module" src="/page-design.js"></script>
    <script type="module" src="/login.js"></script>
  </body>
</html>
